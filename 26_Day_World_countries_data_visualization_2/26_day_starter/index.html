<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="./css/style.css" />
    <title>World Countries List</title>
  </head>

  <body>
    <header id="header">
      <div class="header-content">
        <h1>WORLD COUNTRIES LIST</h1>
        <h2 id="subtitle">Total Number of countries: 0</h2>
        <div id="searchResMsg"></div>
        <div id="btnSet">
          <button id="startWordBtn" class="btn">STARTING WORD</button>
          <button id="searchAnyWordBtn" class="btn">SEARCH WITH ANY WORD</button>
          <button id="sortBtn" class="btn" aria-label="Sort countries">
            <img id="sortIcon" src="./images/ascend.svg" alt="Ascend" width="100%" height="100%" />
          </button>
        </div>
        <div id="searchSet">
          <input id="searchCtx" type="text" placeholder="Search country ..." />
          <button id="searchBtn" aria-label="Search countries">
            <img id="searchIcon" src="./images/search.svg" alt="" width="100%" />
          </button>
        </div>
      </div>
    </header>

    <main>
      <ul id="countries"></ul>
    </main>

    <script type="module" src="./scripts/main.ts"></script>
  </body>
</html>
